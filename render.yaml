services:
  - type: web
    name: kavachx-platform
    runtime: docker # Updated to use Docker for world-class robustness
    plan: free
    # No buildCommand or startCommand needed when using Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8002
      # IMPORTANT: Set CORS_ORIGINS to your actual frontend domain(s)
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BASCG_SIGNING_KEY_SEED_B64
        sync: false
      - key: MOCK_TSA_SECRET
        generateValue: true
      - key: EXPOSE_DEMO_PASSWORDS
        value: "false"
